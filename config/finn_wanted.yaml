# Finn.no "Ønskes kjøpt" (wanted to buy) scraping config
# These are demand signals - people actively looking to buy specific items.

finn:
  base_url: https://www.finn.no
  trade_type: 3  # 3 = Ønskes kjøpt

  rate_limit:
    delay_between_requests_seconds: 3
    max_pages_per_category: 10

  # Furniture subcategories under Møbler og interiør (category 0.78)
  categories:
    - sub_category: "1.78.5196"
      name: "Bord og stoler"
    - sub_category: "1.78.7756"
      name: "Sofaer og lenestoler"
    - sub_category: "1.78.5181"
      name: "Belysning"
    - sub_category: "1.78.5198"
      name: "Garderobe og skap"
    - sub_category: "1.78.8345"
      name: "Hyller og kommoder"

# High-value filtering: listing must match at least one criterion to be kept.
# Brand OR designer match OR price above floor.
filters:
  # Minimum offered price in NOK. Listings below this with no brand/designer match are skipped.
  min_price_nok: 1000

  # Known high-value brands (as they appear on Finn listing cards)
  high_value_brands:
